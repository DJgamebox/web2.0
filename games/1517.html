    <script>
        // 收藏功能 - 使用与主页相同的 localStorage key
        const FAVORITES_KEY = 'gamebox_local_favorites';
        
        function toggleFavorite() {
            const gameId = '1517';
            let favorites = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
            const btn = document.querySelector('.action-btn.favorite');
            const text = document.getElementById('favText');
            const icon = btn.querySelector('i');
            
            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
                btn.classList.remove('active');
                text.textContent = '收藏';
                icon.className = 'far fa-heart';
                showToast('已取消收藏', 'info');
            } else {
                favorites.push(gameId);
                btn.classList.add('active');
                text.textContent = '已收藏';
                icon.className = 'fas fa-heart';
                showToast('已添加到收藏夹', 'success');
            }
            
            localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
            
            // 发送消息通知主页更新收藏状态（如果主页在 opener 中）
            if (window.opener) {
                window.opener.postMessage({ type: 'favoriteChanged', gameId: gameId, isFav: favorites.includes(gameId) }, '*');
            }
        }
        
        // 显示提示消息
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                color: white;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        // 主题切换功能
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const currentTheme = html.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                // 当前是白天，切换到夜晚模式，显示月亮
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                // 当前是夜晚，切换到白天模式，显示太阳
                html.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // 页面加载时应用保存的主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            const icon = document.getElementById('themeIcon');
            if (savedTheme === 'light') {
                // 白天模式：显示太阳（点击切换到夜晚）
                document.documentElement.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                // 夜晚模式：显示月亮（点击切换到白天）
                icon.className = 'fas fa-moon';
            }
            
            // 收藏状态检查
            const gameId = '1517';
            const favorites = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
            if (favorites.includes(gameId)) {
                const btn = document.querySelector('.action-btn.favorite');
                const text = document.getElementById('favText');
                const icon = btn.querySelector('i');
                btn.classList.add('active');
                text.textContent = '已收藏';
                icon.className = 'fas fa-heart';
            }
            
            // 监听来自主页的收藏变更消息
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'favoriteChanged' && event.data.gameId === gameId) {
                    const btn = document.querySelector('.action-btn.favorite');
                    const text = document.getElementById('favText');
                    const icon = btn.querySelector('i');
                    if (event.data.isFav) {
                        btn.classList.add('active');
                        text.textContent = '已收藏';
                        icon.className = 'fas fa-heart';
                    } else {
                        btn.classList.remove('active');
                        text.textContent = '收藏';
                        icon.className = 'far fa-heart';
                    }
                }
            });
            
            // 检查登录状态
            checkLoginStatus();
        });
        
        // 搜索功能

                    return;
                }
                const seriesData = await response.json();
                console.log('game-series.json 加载成功, 系列数:', Object.keys(seriesData).length);
                const currentGame = document.querySelector('.game-title').textContent.trim();
                console.log('当前游戏:', currentGame);
                
                let currentSeries = '';
                for (const [seriesName, games] of Object.entries(seriesData)) {
                    // 模糊匹配：提取游戏名称的核心部分（去除版本号、符号等）
                    const isMatch = games.some(g => {
                        // 直接包含匹配
                        if (currentGame.includes(g) || g.includes(currentGame)) return true;
                        
                        // 提取核心名称（去除冒号、斜杠、加号等符号后的第一部分）
                        const currentCore = currentGame.split(/[：:\/\+_]/)[0].trim();
                        const gameCore = g.split(/[：:\/\+_]/)[0].trim();
                        
                        // 核心名称匹配
                        if (currentCore === gameCore) return true;
                        if (currentCore.includes(gameCore) || gameCore.includes(currentCore)) return true;
                        
                        return false;
                    });
                    
                    if (isMatch) {
                        currentSeries = seriesName;
                        console.log('找到系列:', currentSeries);
                        break;
                    }
                }
                
                if (currentSeries) {
                    const seriesGames = seriesData[currentSeries].filter(g => !currentGame.includes(g) && !g.includes(currentGame));
                    if (seriesGames.length > 0) {
                        // 从 data-embed.js 获取游戏ID映射（支持模糊匹配）
                        const findGameId = (seriesGameName) => {
                            if (typeof importedGames === 'undefined') return null;
                            
                            // 1. 精确匹配
                            const exactMatch = importedGames.find(g => g.name === seriesGameName);
                            if (exactMatch) return exactMatch.id;
                            
                            // 2. 提取系列名称中的核心游戏名（去除下划线后的内容）
                            const coreName = seriesGameName.split(/[_\/]/)[0].trim();
                            
                            // 3. 模糊匹配：检查游戏名是否包含核心名称
                            const fuzzyMatch = importedGames.find(g => {
                                const gameName = g.name;
                                // 核心名称匹配
                                if (gameName.includes(coreName) || coreName.includes(gameName)) return true;
                                // 去除特殊字符后匹配
                                const cleanGameName = gameName.replace(/[：:\/\-_]/g, '');
                                const cleanCoreName = coreName.replace(/[：:\/\-_]/g, '');
                                if (cleanGameName.includes(cleanCoreName) || cleanCoreName.includes(cleanGameName)) return true;
                                return false;
                            });
                            
                            return fuzzyMatch ? fuzzyMatch.id : null;
                        };
                        
                        const seriesHtml = `
                            <div class="game-series-section">
                                <h3 class="series-title"><i class="fas fa-layer-group"></i> ${currentSeries}</h3>
                                <div class="series-games">
                                    ${seriesGames.map(game => {
                                        const gameId = findGameId(game);
                                        if (gameId) {
                                            return `<a href="${gameId}.html" class="series-game-item">${game}</a>`;
                                        } else {
                                            // 如果找不到ID，使用名称（兼容旧数据）
                                            console.warn('游戏系列：未找到游戏ID', game);
                                            return `<a href="${encodeURIComponent(game)}.html" class="series-game-item">${game}</a>`;
                                        }
                                    }).join('')}
                                </div>
                            </div>
                        `;
                        document.querySelector('.container').insertAdjacentHTML('beforeend', seriesHtml);
                    }
                }
            } catch (e) {
                console.log('加载系列失败:', e);
            }
            resolve();
            });
        }

        // 设置返回链接（带页码参数）

            if (params.length > 0) backUrl += '?' + params.join('&');
            document.getElementById('backLink').href = backUrl;

        // 先加载游戏系列，然后添加免责声明
        loadGameSeries().then(addDisclaimer).catch(addDisclaimer);

        // ========== 动态加载最新数据（API作为后备） ==========
        document.addEventListener('DOMContentLoaded', async function() {
            const gameId = '1517';
            if (!gameId) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                return;
            }
            
            try {
                console.log('[动态加载] 正在从 Worker API 获取游戏数据...');
                const response = await fetch('https://api.djgamebox.com/api/games');
                if (!response.ok) throw new Error('API 请求失败: ' + response.status);
                
                const result = await response.json();
                const games = result.games || result.data || [];
                if (!Array.isArray(games)) {
                    throw new Error('API 返回格式错误');
                }
                
                // 查找当前游戏
                const game = games.find(g => String(g.id) === String(gameId));
                if (!game) {
                    console.log('[动态加载] API中未找到游戏 ID:', gameId, '使用本地静态数据');
                    // 使用本地静态数据，无需更新
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    return;
                }
                
                console.log('[动态加载] 获取到最新数据:', game.cn || game.name);
                
                // 字段映射并更新 DOM（仅当API数据有效时）
                const name = game.cn || game.name;
                const nameEn = game.en || game.nameEn;
                const category = game.type || game.category;
                const size = game.size;
                const updateTime = game.update || game.updateTime;
                const desc = game.desc || game.description;
                const cover = game.cover;
                
                // 仅当API返回有效数据时才更新
                if (name) {
                    document.getElementById('gameName').textContent = name;
                    document.getElementById('breadcrumbName').textContent = name;
                    document.title = name + ' - 游戏下载 - 游戏盒子';
                }
                
                if (nameEn) {
                    document.getElementById('gameNameEn').textContent = nameEn;
                    document.getElementById('gameNameEn').style.display = 'block';
                }
                
                if (category) {
                    document.getElementById('gameCategory').textContent = category;
                }
                
                if (size) {
                    document.getElementById('gameSize').textContent = size;
                }
                
                // 格式化更新时间
                if (updateTime) {
                    const date = new Date(Number(updateTime));
                    if (!isNaN(date.getTime())) {
                        document.getElementById('gameDate').textContent = date.toLocaleDateString('zh-CN');
                    }
                }
                
                // 更新封面
                if (cover) {
                    document.getElementById('gameCover').src = cover;
                    document.getElementById('gameCover').style.display = 'block';
                }
                
                // 更新下载链接（如果API中有）
                const downloadContainer = document.getElementById('downloadButtons');
                if (downloadContainer && (game.link1 || game.baiduLink1)) {
                    let linksHtml = '';
                    const link1 = game.link1 || game.baiduLink1;
                    const link2 = game.link2 || game.baiduLink2;
                    const link3 = game.link3 || game.thunderLink;
                    
                    if (link1) {
                        linksHtml += `<a href="javascript:void(0)" onclick="recordGameDownload(gameId, '${link1}')" class="download-btn baidu"><img src="../images/baidu-icon-v2.png" alt="百度网盘" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;">百度网盘下载</a>`;
                    }
                    if (link2) {
                        linksHtml += `<a href="javascript:void(0)" onclick="recordGameDownload(gameId, '${link2}')" class="download-btn baidu"><img src="../images/baidu-icon-v2.png" alt="百度网盘" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;">百度网盘备用</a>`;
                    }
                    if (link3) {
                        linksHtml += `<a href="javascript:void(0)" onclick="recordGameDownload(gameId, '${link3}')" class="download-btn thunder"><img src="../images/xunlei-icon-v2.png" alt="迅雷" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;">迅雷下载</a>`;
                    }
                    
                    if (linksHtml) {
                        downloadContainer.innerHTML = linksHtml;
                    }
                }
                
                // 更新描述
                if (desc) {
                    const descEl = document.getElementById('gameDesc');
                    if (descEl) descEl.textContent = desc;
                }
                
                console.log('[动态加载] 数据更新完成');
            } catch (err) {
                console.log('[动态加载] 失败，使用静态数据:', err.message);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        });
        
        // 下载桌面客户端（与主页保持一致）
        async function downloadClient(source = 'detail') {
            // 记录下载统计
            try {
                await fetch('https://api.djgamebox.com/api/client-download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        source: source,
                        page: window.location.href,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('记录客户端下载失败:', error);
            }
            
            // 直接下载本地安装包
            const link = document.createElement('a');
            link.href = '../downloads/游戏盒子 Setup 1.1.0.exe';
            link.download = '游戏盒子 Setup 1.1.0.exe';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showDownloadCompleteTip();

        // 记录游戏下载并跳转 - 5.27 新增
        async function recordGameDownload(gameId, link) {
            try {
                await fetch('https://api.djgamebox.com/api/game-download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        gameId: gameId,
                        source: 'web',
                        page: window.location.href,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('记录游戏下载失败:', error);
            }
            // 跳转
            window.open(link, '_blank');
        }
