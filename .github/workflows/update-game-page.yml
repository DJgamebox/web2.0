name: Update Single Game Page

on:
  workflow_dispatch:
    inputs:
      gameId:
        description: '游戏ID'
        required: true

jobs:
  update-game-page:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Fetch data from Cloud API
      run: |
        echo "Fetching game data from cloud API..."
        curl -s "https://api.djgamebox.com/api/games" -o api-data.json
        echo "API data fetched successfully"
        
    - name: Update data-embed.js from API
      run: |
        node update-data-from-api.js
        
    - name: Generate specific game page
      run: |
        echo "Generating game page for ID: ${{ github.event.inputs.gameId }}"
        node generate-single-game.js ${{ github.event.inputs.gameId }}
        
    - name: Commit updated page
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add games/${{ github.event.inputs.gameId }}.html
        git diff --staged --quiet || (git commit -m "Update game page: ${{ github.event.inputs.gameId }}" && git push)
      continue-on-error: true
        
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
      
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
