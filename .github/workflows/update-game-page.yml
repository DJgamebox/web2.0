name: Update Single Game Page

on:
  workflow_dispatch:
    inputs:
      gameId:
        description: '游戏ID'
        required: true
        type: string

jobs:
  update-game-page:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Fetch data from Cloud API
      run: |
        echo "Fetching game data from cloud API..."
        curl -s "https://api.djgamebox.com/api/games" -o api-data.json
        echo "API data fetched successfully"
        
    - name: Update data-embed.js from API
      run: |
        echo "Converting API data to data-embed.js format..."
        node -e "
        const fs = require('fs');
        const apiData = JSON.parse(fs.readFileSync('api-data.json', 'utf8'));
        const games = apiData.games || [];
        
        // 转换数据格式
        const importedGames = games.map(game => ({
          id: game.id,
          name: game.cn || game.name || '',
          nameEn: game.en || game.nameEn || '',
          cover: game.cover || '',
          screenshots: game.screenshots || [],
          category: game.type || game.category || '',
          size: game.size || '',
          description: game.desc || game.description || '',
          baiduLink1: game.link1 || game.baiduLink1 || '',
          baiduLink2: game.link2 || game.baiduLink2 || '',
          baiduLink3: game.link4 || game.baiduLink3 || '',
          thunderLink: game.link3 || game.thunderLink || '',
          favorite: game.favorite || false,
          dateAdded: game.dateAdded || game.update || new Date().toLocaleDateString('zh-CN'),
          isDrm: game.isDrm || false,
          downloadsWeb: game.downloadsWeb || 0,
          downloadsApp: game.downloadsApp || 0,
          updateTime: game.updateTime || Date.now()
        }));
        
        const output = \`// 游戏数据 - 由 GitHub Actions 从云端 API 自动生成
// 生成时间: \${new Date().toLocaleString('zh-CN')}
// 游戏数量: \${importedGames.length}

const importedGames = \${JSON.stringify(importedGames, null, 2)};

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { importedGames };
}
\`;
        
        fs.writeFileSync('data-embed.js', output);
        console.log('data-embed.js updated with', importedGames.length, 'games from cloud API');
        "
        
    - name: Generate specific game page
      run: |
        echo "Generating game page for ID: ${{ github.event.inputs.gameId }}"
        node generate-single-game.js ${{ github.event.inputs.gameId }}
        
    - name: Commit updated page
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add games/${{ github.event.inputs.gameId }}.html
        git diff --staged --quiet || (git commit -m "Update game page: ${{ github.event.inputs.gameId }}" && git push)
      continue-on-error: true
        
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
      
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      # test
